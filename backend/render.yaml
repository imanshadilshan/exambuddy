services:
  - type: web
    name: exambuddy-backend
    env: python
    region: singapore
    plan: free
    branch: main
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
