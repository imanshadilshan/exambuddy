<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#appleGrad)"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(90, 90)">
    <!-- Cap -->
    <path d="M -55 -15 L 0 -35 L 55 -15 L 0 5 Z" fill="#ffffff" opacity="0.95"/>
    <ellipse cx="0" cy="-15" rx="55" ry="12" fill="#ffffff" opacity="0.9"/>
    
    <!-- Tassel -->
    <rect x="-3" y="-35" width="6" height="22" fill="#fbbf24" rx="2"/>
    <circle cx="0" cy="-38" r="5" fill="#fbbf24"/>
    
    <!-- Book -->
    <rect x="-25" y="12" width="50" height="38" fill="#f3f4f6" rx="3"/>
    <line x1="-25" y1="24" x2="25" y2="24" stroke="#d1d5db" stroke-width="2"/>
    <line x1="-25" y1="34" x2="25" y2="34" stroke="#d1d5db" stroke-width="2"/>
    <line x1="0" y1="12" x2="0" y2="50" stroke="#d1d5db" stroke-width="2"/>
  </g>
</svg>
