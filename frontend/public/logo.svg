<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Graduation Cap Icon -->
  <g transform="translate(256, 256)">
    <!-- Cap base -->
    <path d="M -180 -50 L 0 -120 L 180 -50 L 0 20 Z" fill="#ffffff" opacity="0.95"/>
    
    <!-- Cap top -->
    <ellipse cx="0" cy="-50" rx="180" ry="40" fill="#ffffff" opacity="0.9"/>
    
    <!-- Tassel -->
    <rect x="-10" y="-120" width="20" height="80" fill="#fbbf24" rx="5"/>
    <circle cx="0" cy="-130" r="15" fill="#fbbf24"/>
    
    <!-- Book pages -->
    <rect x="-80" y="40" width="160" height="120" fill="#f3f4f6" rx="8"/>
    <line x1="-80" y1="80" x2="80" y2="80" stroke="#d1d5db" stroke-width="3"/>
    <line x1="-80" y1="110" x2="80" y2="110" stroke="#d1d5db" stroke-width="3"/>
    <line x1="0" y1="40" x2="0" y2="160" stroke="#d1d5db" stroke-width="3"/>
  </g>
</svg>
